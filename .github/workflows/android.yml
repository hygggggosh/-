name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install buildozer kivy kivymd requests

      - name: Build APK
        run: |
          buildozer android debug
        env:
          BUILDJOBS: 2

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: HermesChat-APK
          path: hermes-chat/bin/*.apk
