name: Build Android APK

on:
  workflow_dispatch:        # 手动触发（推荐：APK 构建慢，10-15 分钟，push 自动跑浪费 CI 配额）
  push:
    branches: [main]
    paths:
      - 'main.py'
      - 'buildozer.spec'
      - '.github/workflows/build-apk.yml'
  pull_request:
    branches: [main]
    paths:
      - 'main.py'
      - 'buildozer.spec'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential ccache git libffi-dev libssl-dev \
            libltdl-dev libxml2-dev libxslt1-dev zlib1g-dev \
            autoconf automake libtool pkg-config patchelf unzip wget

      - name: Install buildozer
        run: |
          pip install --upgrade pip
          pip install buildozer cython

      - name: Pre-accept Android SDK licenses
        # buildozer 首次下 SDK 会卡在交互式 license prompt，必须预先 accept。
        # 这里用 cmdline-tools 直接走非交互流程并写入 buildozer 的 SDK 目录。
        run: |
          set -e
          BUILDOZER_SDK="$HOME/.buildozer/android/platform/android-sdk"
          mkdir -p "$BUILDOZER_SDK/cmdline-tools"
          cd /tmp
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline-tools.zip
          unzip -q cmdline-tools.zip
          mv cmdline-tools "$BUILDOZER_SDK/cmdline-tools/latest"
          export ANDROID_HOME="$BUILDOZER_SDK"
          export PATH="$BUILDOZER_SDK/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$PATH"
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          echo "Licenses accepted."

      - name: Build APK (debug)
        env:
          GRADLE_OPTS: '-Xmx2g'
          ANDROID_HOME: ${{ env.HOME }}/.buildozer/android/platform/android-sdk
          BUILDOZER_BUILD_DIR: ${{ github.workspace }}/.buildozer
        run: |
          export PATH="$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$PATH"
          buildozer -v android debug 2>&1 | tee build.log
          if [ ${PIPESTATUS[0]} -ne 0 ]; then
            echo "===== BUILD FAILED — last 200 lines of build.log ====="
            tail -n 200 build.log
            exit 1
          fi

      - name: Verify APK exists
        run: |
          ls -la bin/
          APK=$(find bin/ -name "*.apk" | head -1)
          if [ -z "$APK" ]; then
            echo "::error::No APK found in bin/"
            exit 1
          fi
          echo "APK_PATH=$APK" >> $GITHUB_ENV

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: hermeschat-debug-apk
          path: ${{ env.APK_PATH }}
          if-no-files-found: error
          retention-days: 30

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          if-no-files-found: warn
          retention-days: 7